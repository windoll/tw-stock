<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股即時報價</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --line:#2a2e38; --txt:#e6e8ee;
    --sub:#8b909c; --up:#ff5252; --down:#26c281; --flat:#9aa0ad; --accent:#4f8cff;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--txt);padding:20px;max-width:880px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}
  .meta{color:var(--sub);font-size:13px;margin-bottom:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  input,select,button{font-size:15px;padding:10px 12px;border-radius:8px;border:1px solid var(--line);
    background:var(--card);color:var(--txt);outline:none}
  input{flex:1;min-width:160px}
  button{cursor:pointer;background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  button.ghost{background:var(--card);color:var(--txt);border-color:var(--line);font-weight:400}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:10px 8px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--sub);font-weight:500;font-size:12px}
  td.name,th.name{text-align:left}
  .code{color:var(--sub);font-size:12px}
  .px{font-weight:700;font-size:16px}
  .up{color:var(--up)} .down{color:var(--down)} .flat{color:var(--flat)}
  .del{cursor:pointer;color:var(--sub);background:none;border:none;font-size:16px;padding:4px 8px}
  .empty{color:var(--sub);text-align:center;padding:40px 0}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--down);display:inline-block}
  .err{color:var(--up);font-size:13px;margin-top:8px;min-height:18px}

  /* 檢視切換 */
  .toggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .toggle button{background:var(--card);color:var(--sub);border:none;border-radius:0;padding:6px 12px;font-weight:600;font-size:13px}
  .toggle button.on{background:var(--accent);color:#fff}
  .hidden{display:none!important}

  /* 卡片模式 */
  #cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  @media(max-width:520px){#cards{grid-template-columns:1fr}}
  .card{position:relative;background:var(--card);border:2px solid var(--line);border-radius:10px;padding:14px}
  .card.up{border-color:var(--up)} .card.down{border-color:var(--down)} .card.flat{border-color:var(--flat)}
  .card .cname{font-size:15px;font-weight:600;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card .ccode{font-size:11px;color:var(--sub);font-weight:400}
  .card .cpx{font-size:38px;font-weight:800;text-align:center;line-height:1.2;margin:6px 0}
  .card .crow{display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:700}
  .card .cdel{position:absolute;top:6px;right:8px;cursor:pointer;color:var(--sub);background:none;border:none;font-size:13px;opacity:.5}
  .card .cdel:hover{opacity:1}
  .card .chold{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:13px;display:flex;justify-content:space-between}
  .card .chold .lbl{color:var(--sub);font-weight:400}

  /* 持股輸入與總計 */
  .tablewrap{overflow-x:auto}
  input.hold{width:74px;min-width:0;flex:none;padding:5px 6px;font-size:13px;text-align:right}
  input.hold::-webkit-outer-spin-button,input.hold::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .summary{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px 14px;
    margin-bottom:14px;font-size:14px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .summary .lbl{color:var(--sub)}
  .summary b{font-size:17px}
</style>
</head>
<body>
  <h1>台股即時報價</h1>
  <div class="meta">
    <span><span class="dot" id="dot"></span> <span id="status">就緒</span></span>
    <span>更新間隔
      <select id="interval">
        <option value="10">10 秒</option>
        <option value="30">30 秒</option>
        <option value="60" selected>60 秒</option>
        <option value="0">不自動</option>
      </select>
    </span>
    <button id="refreshBtn" class="ghost">立即更新</button>
    <span class="toggle" id="viewToggle">
      <button data-view="table" class="on">表格</button>
      <button data-view="cards">卡片</button>
    </span>
    <span id="updated"></span>
  </div>

  <div class="bar">
    <input id="codeInput" placeholder="股票代號，例：2330（上市）/ 6488（上櫃）" autocomplete="off">
    <button id="addBtn">加入</button>
  </div>
  <div class="err" id="err"></div>

  <div class="summary hidden" id="summary"></div>

  <div class="tablewrap">
  <table id="tableView">
    <thead>
      <tr>
        <th class="name">名稱</th>
        <th>成交</th><th>漲跌</th><th>幅度</th>
        <th>股數</th><th>買價</th><th>損益</th><th>報酬率</th>
        <th class="name">股利（現金／股票）</th>
        <th>開</th><th>高</th><th>低</th><th>昨收</th><th>量</th><th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  </div>
  <div id="cards" class="hidden"></div>
  <div class="empty" id="empty">尚未加入任何股票，請於上方輸入代號。</div>

<script>
const LS_KEY = "tw_watchlist_v1";
const LS_VIEW = "tw_view_v1";
let watch = load();          // [{code}]
let view = localStorage.getItem(LS_VIEW) || "table";   // table | cards
let timer = null;

function load(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||[] }catch(e){ return [] } }
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(watch)); }

// ── 股利資料（TWSE OpenAPI，支援 CORS 可直連；僅上市）──────────────
// 註：此資料集只有「股利年度／董事會分派日」，無「除權息交易日」；上櫃不在內。
let divMap = {};            // code -> {year, cash, stock, date}
const DIV_URL = "https://openapi.twse.com.tw/v1/opendata/t187ap45_L";

function rocDate(s){        // 民國日期字串 1150311 -> 2026/03/11
  if(!s || s.length<6) return "";
  const y = parseInt(s.slice(0, s.length-4),10) + 1911;
  return `${y}/${s.slice(-4,-2)}/${s.slice(-2)}`;
}
function sumFields(row, keys){ return keys.reduce((a,k)=>a + (parseFloat(row[k])||0), 0); }

// 先試直連，失敗（多為瀏覽器 CORS）再用 proxy 後援競速
async function fetchJsonResilient(url){
  try{
    const r = await fetch(url, {cache:"no-store"});
    if(r.ok) return await r.json();
  }catch(e){ /* 改走 proxy */ }
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), 15000);
  try{
    return await Promise.any(PROXIES.map(async w => {
      const r = await fetch(w(url), {cache:"no-store", signal:ctrl.signal});
      if(!r.ok) throw new Error("HTTP "+r.status);
      return await r.json();
    }));
  } finally { clearTimeout(t); ctrl.abort(); }
}

async function loadDividends(){
  try{
    const arr = await fetchJsonResilient(DIV_URL);
    const map = {};
    arr.forEach(row => {
      const code = row["公司代號"];
      if(!code) return;
      const cash = sumFields(row, ["股東配發-盈餘分配之現金股利(元/股)","股東配發-法定盈餘公積發放之現金(元/股)","股東配發-資本公積發放之現金(元/股)"]);
      const stock = sumFields(row, ["股東配發-盈餘轉增資配股(元/股)","股東配發-法定盈餘公積轉增資配股(元/股)","股東配發-資本公積轉增資配股(元/股)"]);
      const date = row["董事會（擬議）股利分派日"] || row["股東會日期"] || "";
      // 同代號可能多筆（季配等），保留分派日最新的一筆
      const prev = map[code];
      if(!prev || date > prev.rawDate){
        map[code] = {year: row["股利年度"]||"", cash, stock, date: rocDate(date), rawDate: date};
      }
    });
    divMap = map;
    render();   // 股利到位後重繪
  }catch(e){ /* 股利抓取失敗不影響報價 */ }
}

function divCell(code){
  const d = divMap[code];
  if(!d || (!d.cash && !d.stock)) return `<span class="flat">—</span>`;
  const yr = d.year ? d.year+"年 " : "";
  const sub = d.date ? `<div class="code">${yr}分派 ${d.date}</div>` : (yr?`<div class="code">${yr}</div>`:"");
  return `現金 ${fmt(d.cash)}　股票 ${fmt(d.stock)}${sub}`;
}

// 經 CORS proxy 抓 TWSE 即時報價（純前端無法直連 mis.twse）
const PROXIES = [
  u => "https://corsproxy.io/?url=" + encodeURIComponent(u),
  u => "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(u),
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
];

async function fetchVia(wrap, url, signal){
  const r = await fetch(wrap(url), {cache:"no-store", signal});
  if(!r.ok) throw new Error("HTTP "+r.status);
  const data = await r.json();
  if(!data || !data.msgArray) throw new Error("無資料");
  return data.msgArray;
}

async function fetchQuotes(codes){
  if(!codes.length) return [];
  // 同時查上市與上櫃，存在者才會回傳
  const exch = codes.map(c => `tse_${c}.tw|otc_${c}.tw`).join("|");
  const url = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${exch}&json=1&delay=0&_=${Date.now()}`;
  // 同時向所有 proxy 發出，誰先回來就用誰；8 秒逾時
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 8000);
  try{
    return await Promise.any(PROXIES.map(w => fetchVia(w, url, ctrl.signal)));
  }catch(e){
    throw new Error("來源逾時或無回應");
  }finally{
    clearTimeout(timer);
    ctrl.abort();   // 取消其餘較慢的請求
  }
}

function num(v){ const n = parseFloat(v); return isNaN(n) ? null : n; }
function pickPrice(m){
  let p = num(m.z);                       // 成交價
  if(p===null){ const a = (m.a||"").split("_")[0]; p = num(a); }   // 退而求其次：賣一
  if(p===null){ const b = (m.b||"").split("_")[0]; p = num(b); }   // 買一
  if(p===null) p = num(m.y);              // 昨收
  return p;
}
function fmt(n,d=2){ return n===null||n===undefined ? "—" : Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}); }

let lastRows = [];   // 暫存最後一次抓到的資料，供切換檢視/排序後重繪

function clsOf(v){ return v===null||v===0 ? "flat" : (v>0?"up":"down"); }
function signOf(v){ return v>0?"▲":(v<0?"▼":""); }

function calc(m, w){
  const price = pickPrice(m);
  const y = num(m.y);
  const diff = (price!==null && y!==null) ? price - y : null;
  const pct  = (diff!==null && y) ? diff / y * 100 : null;
  // 持股損益
  const qty = w && num(w.qty), cost = w && num(w.cost);
  let pl=null, plPct=null, hasHold=false;
  if(qty && cost && price!==null){
    hasHold = true;
    pl = (price - cost) * qty;
    plPct = (price - cost) / cost * 100;
  }
  return {price, y, diff, pct, cls:clsOf(diff), sign:signOf(diff),
          vol:num(m.v), qty, cost, pl, plPct, hasHold};
}

function render(rows){
  if(rows) lastRows = rows;
  document.getElementById("empty").style.display = watch.length ? "none":"block";
  const byCode = {};
  lastRows.forEach(m => { byCode[m.c] = m; });
  if(view==="table") renderTable(byCode); else renderCards(byCode);
  renderSummary(byCode);
}

function renderSummary(byCode){
  const box = document.getElementById("summary");
  let totalCost=0, totalVal=0, any=false;
  watch.forEach(w => {
    const m = byCode[w.code]; if(!m) return;
    const d = calc(m, w);
    if(d.hasHold){ any=true; totalCost += d.cost*d.qty; totalVal += d.price*d.qty; }
  });
  if(!any){ box.classList.add("hidden"); box.innerHTML=""; return; }
  box.classList.remove("hidden");
  const pl = totalVal - totalCost;
  const plPct = totalCost ? pl/totalCost*100 : null;
  const cls = clsOf(pl);
  box.innerHTML = `
    <span><span class="lbl">總成本</span> ${fmt(totalCost,0)}</span>
    <span><span class="lbl">總市值</span> ${fmt(totalVal,0)}</span>
    <span><span class="lbl">總損益</span> <b class="${cls}">${signOf(pl)} ${fmt(Math.abs(pl),0)}</b>
      <span class="${cls}">(${plPct===null?"—":signOf(pl)+fmt(Math.abs(plPct))+"%"})</span></span>`;
}

function renderTable(byCode){
  const tb = document.getElementById("tbody");
  // 正在編輯持股欄位時不重建，避免打字被自動更新打斷
  if(document.activeElement && document.activeElement.classList.contains("hold")) return;
  tb.innerHTML = watch.map(w => {
    const m = byCode[w.code];
    const qv = w.qty!=null ? w.qty : "";
    const cv = w.cost!=null ? w.cost : "";
    const holdCells = `
      <td><input class="hold" type="number" min="0" step="1" data-code="${w.code}" data-f="qty" value="${qv}" placeholder="—"></td>
      <td><input class="hold" type="number" min="0" step="0.01" data-code="${w.code}" data-f="cost" value="${cv}" placeholder="—"></td>`;
    if(!m) return `<tr draggable="true" data-code="${w.code}">
      <td class="name">⠿ ${w.code} <span class="code">查無資料</span></td>
      <td class="flat">—</td><td class="flat">—</td><td class="flat">—</td>
      ${holdCells}<td class="flat">—</td><td class="flat">—</td>
      <td class="name">${divCell(w.code)}</td>
      <td class="flat">—</td><td class="flat">—</td><td class="flat">—</td><td class="flat">—</td><td class="flat">—</td>
      <td><button class="del" data-code="${w.code}">✕</button></td></tr>`;
    const d = calc(m, w);
    return `<tr draggable="true" data-code="${m.c}">
      <td class="name">⠿ <b>${m.n||""}</b> <span class="code">${m.c}</span></td>
      <td class="px ${d.cls}">${fmt(d.price)}</td>
      <td class="${d.cls}">${d.sign} ${d.diff===null?"—":fmt(Math.abs(d.diff))}</td>
      <td class="${d.cls}">${d.pct===null?"—":fmt(Math.abs(d.pct))+"%"}</td>
      ${holdCells}
      <td class="${d.hasHold?clsOf(d.pl):'flat'}">${d.hasHold?signOf(d.pl)+" "+fmt(Math.abs(d.pl),0):"—"}</td>
      <td class="${d.hasHold?clsOf(d.pl):'flat'}">${d.hasHold?signOf(d.pl)+fmt(Math.abs(d.plPct))+"%":"—"}</td>
      <td class="name">${divCell(m.c)}</td>
      <td>${fmt(num(m.o))}</td><td>${fmt(num(m.h))}</td><td>${fmt(num(m.l))}</td>
      <td>${fmt(d.y)}</td><td>${d.vol===null?"—":d.vol.toLocaleString()}</td>
      <td><button class="del" data-code="${m.c}">✕</button></td>
    </tr>`;
  }).join("");
  tb.querySelectorAll(".del").forEach(b => b.onclick = () => removeCode(b.dataset.code));
  tb.querySelectorAll("input.hold").forEach(inp => {
    inp.onchange = () => setHold(inp.dataset.code, inp.dataset.f, inp.value);
    inp.onkeydown = e => { if(e.key==="Enter") inp.blur(); };
  });
  enableDrag(tb, "tr");
}

function setHold(code, field, value){
  const w = watch.find(x=>x.code===code); if(!w) return;
  const n = parseFloat(value);
  w[field] = (value==="" || isNaN(n)) ? null : n;
  save(); render();
}

function renderCards(byCode){
  const wrap = document.getElementById("cards");
  wrap.innerHTML = watch.map(w => {
    const m = byCode[w.code];
    if(!m) return `<div class="card flat" draggable="true" data-code="${w.code}">
      <button class="cdel" data-code="${w.code}">✕</button>
      <div class="cname">${w.code} <span class="ccode">查無資料</span></div>
      <div class="cpx flat">—</div><div class="crow flat"><span>—</span><span>—</span></div></div>`;
    const d = calc(m, w);
    const hold = d.hasHold ? `<div class="chold">
        <span class="lbl">持有 ${d.qty.toLocaleString()} 股 @ ${fmt(d.cost)}</span>
        <span class="${clsOf(d.pl)}">${signOf(d.pl)} ${fmt(Math.abs(d.pl),0)} (${signOf(d.pl)}${fmt(Math.abs(d.plPct))}%)</span>
      </div>` : "";
    const dv = divMap[m.c];
    const divLine = (dv && (dv.cash||dv.stock)) ? `<div class="chold">
        <span class="lbl">股利${dv.year?" "+dv.year+"年":""}</span>
        <span>現金 ${fmt(dv.cash)}　股票 ${fmt(dv.stock)}</span>
      </div>` : "";
    return `<div class="card ${d.cls}" draggable="true" data-code="${m.c}">
      <button class="cdel" data-code="${m.c}">✕</button>
      <div class="cname">${m.n||""} <span class="ccode">${m.c}</span></div>
      <div class="cpx ${d.cls}">${fmt(d.price)}</div>
      <div class="crow ${d.cls}">
        <span>${d.sign} ${d.diff===null?"—":fmt(Math.abs(d.diff))}</span>
        <span>${d.pct===null?"—":fmt(Math.abs(d.pct))+"%"}</span>
      </div>${hold}${divLine}</div>`;
  }).join("");
  wrap.querySelectorAll(".cdel").forEach(b => b.onclick = () => removeCode(b.dataset.code));
  enableDrag(wrap, ".card");
}

// 拖曳排序：適用表格列與卡片
let dragCode = null;
function enableDrag(container, sel){
  container.querySelectorAll(sel).forEach(el => {
    el.style.cursor = "grab";
    el.ondragstart = e => {
      if(e.target.classList && e.target.classList.contains("hold")){ e.preventDefault(); return; } // 編輯持股時不啟動拖曳
      dragCode = el.dataset.code; e.dataTransfer.effectAllowed="move"; el.style.opacity=".4";
    };
    el.ondragend   = () => { el.style.opacity="1"; dragCode=null; };
    el.ondragover  = e => { e.preventDefault(); };
    el.ondrop      = e => {
      e.preventDefault();
      const target = el.dataset.code;
      if(!dragCode || dragCode===target) return;
      const from = watch.findIndex(w=>w.code===dragCode);
      const to   = watch.findIndex(w=>w.code===target);
      if(from<0||to<0) return;
      const [moved] = watch.splice(from,1);
      watch.splice(to,0,moved);
      save(); render();
    };
  });
}

function setView(v){
  view = v;
  localStorage.setItem(LS_VIEW, v);
  document.getElementById("tableView").classList.toggle("hidden", v!=="table");
  document.getElementById("cards").classList.toggle("hidden", v!=="cards");
  document.querySelectorAll("#viewToggle button").forEach(b => b.classList.toggle("on", b.dataset.view===v));
  render();
}

async function refresh(){
  if(!watch.length){ render([]); return; }
  setStatus("更新中…", true);
  try{
    const rows = await fetchQuotes(watch.map(w=>w.code));
    render(rows);
    document.getElementById("updated").textContent = "最後更新 " + new Date().toLocaleTimeString("zh-TW");
    document.getElementById("err").textContent = "";
    setStatus("已連線", false);
  }catch(e){
    document.getElementById("err").textContent = "更新失敗：" + e.message + "（proxy 或來源暫時無法存取，稍後重試）";
    setStatus("連線異常", false);
  }
}

function setStatus(t, busy){
  document.getElementById("status").textContent = t;
  document.getElementById("dot").style.background = busy ? "var(--accent)" : "var(--down)";
}

function addCode(){
  const inp = document.getElementById("codeInput");
  const code = inp.value.trim().toUpperCase();
  document.getElementById("err").textContent = "";
  if(!/^[0-9A-Z]{3,6}$/.test(code)){ document.getElementById("err").textContent="代號格式不正確"; return; }
  if(watch.some(w=>w.code===code)){ document.getElementById("err").textContent="已在清單中"; inp.value=""; return; }
  watch.push({code}); save(); inp.value="";
  render();        // 先立即顯示（此時報價欄為「—」），讓使用者確認已加入
  refresh();       // 再向伺服器抓最新報價填入
}
function removeCode(code){ watch = watch.filter(w=>w.code!==code); save(); refresh(); }

function setupTimer(){
  if(timer) clearInterval(timer);
  const s = parseInt(document.getElementById("interval").value,10);
  if(s>0) timer = setInterval(refresh, s*1000);
}

document.getElementById("addBtn").onclick = addCode;
document.getElementById("refreshBtn").onclick = refresh;
document.getElementById("codeInput").addEventListener("keydown", e => { if(e.key==="Enter") addCode(); });
document.getElementById("interval").addEventListener("change", setupTimer);
document.querySelectorAll("#viewToggle button").forEach(b => b.onclick = () => setView(b.dataset.view));

setView(view); refresh(); setupTimer(); loadDividends();
</script>
</body>
</html>
