<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股即時報價</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --line:#2a2e38; --txt:#e6e8ee;
    --sub:#8b909c; --up:#ff5252; --down:#26c281; --flat:#9aa0ad; --accent:#4f8cff;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--txt);padding:20px;max-width:880px;margin:0 auto}
  h1{font-size:20px;margin:0}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .topright{display:flex;gap:8px;align-items:center}
  .meta{color:var(--sub);font-size:13px;margin-bottom:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  input,select,button{font-size:15px;padding:10px 12px;border-radius:8px;border:1px solid var(--line);
    background:var(--card);color:var(--txt);outline:none}
  input{flex:1;min-width:160px}
  button{cursor:pointer;background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  button.ghost{background:var(--card);color:var(--txt);border-color:var(--line);font-weight:400}
  #eyeBtn{padding:8px 12px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:10px 8px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--sub);font-weight:500;font-size:12px}
  td.name,th.name{text-align:left}
  .code{color:var(--sub);font-size:12px}
  .px{font-weight:700;font-size:16px}
  .up{color:var(--up)} .down{color:var(--down)} .flat{color:var(--flat)}
  .del{cursor:pointer;color:var(--sub);background:none;border:none;font-size:16px;padding:4px 8px}
  .empty{color:var(--sub);text-align:center;padding:40px 0}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--down);display:inline-block}
  .err{color:var(--up);font-size:13px;margin-top:8px;min-height:18px}
  .note{color:var(--sub);font-size:12px;margin:8px 0 16px;line-height:1.6}

  /* 切換鈕 */
  .toggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .toggle button{background:var(--card);color:var(--sub);border:none;border-radius:0;padding:6px 12px;font-weight:600;font-size:13px}
  .toggle button.on{background:var(--accent);color:#fff}
  .hidden{display:none!important}

  /* 隱私：隱藏獲利資訊 */
  body.hideprivate .priv{filter:blur(8px);user-select:none}

  /* 卡片模式 */
  #cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  @media(max-width:520px){#cards{grid-template-columns:1fr}}
  .card{position:relative;background:var(--card);border:2px solid var(--line);border-radius:10px;padding:14px}
  .card.up{border-color:var(--up)} .card.down{border-color:var(--down)} .card.flat{border-color:var(--flat)}
  .card .cname{font-size:15px;font-weight:600;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card .ccode{font-size:11px;color:var(--sub);font-weight:400}
  .card .cpx{font-size:38px;font-weight:800;text-align:center;line-height:1.2;margin:6px 0}
  .card .crow{display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:700}
  .card .cdel{position:absolute;top:6px;right:8px;cursor:pointer;color:var(--sub);background:none;border:none;font-size:13px;opacity:.5}
  .card .cdel:hover{opacity:1}
  .card .chold{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:13px;display:flex;justify-content:space-between}
  .card .chold .lbl{color:var(--sub);font-weight:400}

  /* 持股輸入與總計 */
  .tablewrap{overflow-x:auto}
  input.hold{width:74px;min-width:0;flex:none;padding:5px 6px;font-size:13px;text-align:right}
  input.hold::-webkit-outer-spin-button,input.hold::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .summary{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px 14px;
    margin-bottom:14px;font-size:14px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .summary .lbl{color:var(--sub)}
  .summary b{font-size:17px}
  .daterow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .daterow input[type=date]{flex:none;min-width:0;width:auto}
  .daterow label{color:var(--sub);font-size:13px}
  tr.dhead{cursor:pointer}
  tr.dhead:hover{background:var(--card)}
  tr.dhead td{font-weight:600}
  tr.dhead .arrow{display:inline-block;width:14px;color:var(--sub)}
  tr.drow{display:none}
  tr.drow.show{display:table-row}
  tr.drow td{color:var(--sub)}
  tr.drow td.recv{color:var(--txt)}
  .idxbar{display:flex;gap:18px;flex-wrap:wrap;font-size:14px;color:var(--sub);margin-bottom:14px}
  .idxbar .lbl{color:var(--sub)} .idxbar b{color:var(--txt);font-size:15px}
  .alert{background:#2a2410;border:1px solid #5a4a1a;color:#f7d774;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:14px}
  .pie{display:flex;gap:18px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:14px;flex-wrap:wrap}
  .pieC{width:120px;height:120px;border-radius:50%;flex:none}
  .legwrap{display:flex;flex-direction:column;gap:4px;font-size:13px}
  .leg{display:flex;align-items:center;gap:6px}
  .dotc{width:10px;height:10px;border-radius:2px;display:inline-block}
  button.mini{background:none;border:none;color:var(--sub);cursor:pointer;font-size:13px;padding:2px 4px}
  button.mini:hover{color:var(--accent)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
  .modal-box{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:18px;max-width:560px;width:100%;max-height:88vh;overflow:auto}
  .modal-box h3{margin:0 0 12px;font-size:16px}
  .modal-box .x{float:right;cursor:pointer;color:var(--sub);background:none;border:none;font-size:18px}
  .lottable input,.lottable select{padding:6px 8px;font-size:13px;width:100%}
  .lottable td{padding:4px}
  .yearbars{display:flex;flex-direction:column;gap:6px;margin:10px 0 18px}
  .ybar{display:flex;align-items:center;gap:8px;font-size:13px}
  .ybar .yl{width:48px;color:var(--sub)}
  .ybar .yt{flex:1;background:var(--line);border-radius:4px;height:18px;overflow:hidden;display:block}
  .ybar .yf{display:block;height:100%;background:var(--accent);border-radius:4px;min-width:2px}
  .ybar .yv{width:110px;text-align:right}
</style>
</head>
<body>
  <div class="topbar">
    <h1>台股即時報價</h1>
    <div class="topright">
      <span class="toggle" id="pageTabs">
        <button data-page="quotes" class="on">報價</button>
        <button data-page="div">股利</button>
      </span>
      <button id="eyeBtn" class="ghost" title="隱藏／顯示獲利資訊">👁</button>
    </div>
  </div>

  <div id="indexBar" class="idxbar">—</div>

  <!-- ───── 報價頁 ───── -->
  <div id="page-quotes">
    <div class="meta">
      <span><span class="dot" id="dot"></span> <span id="status">就緒</span></span>
      <span>更新間隔
        <select id="interval">
          <option value="10">10 秒</option>
          <option value="30">30 秒</option>
          <option value="60" selected>60 秒</option>
          <option value="0">不自動</option>
        </select>
      </span>
      <button id="refreshBtn" class="ghost">立即更新</button>
      <span class="toggle" id="viewToggle">
        <button data-view="table" class="on">表格</button>
        <button data-view="cards">卡片</button>
      </span>
      <span id="updated"></span>
    </div>

    <div class="bar">
      <input id="codeInput" placeholder="股票代號，例：2330（上市）/ 6488（上櫃）" autocomplete="off">
      <button id="addBtn">加入</button>
      <button id="exportBtn" class="ghost" title="備份自選與持股">匯出</button>
      <button id="importBtn" class="ghost" title="還原備份">匯入</button>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none">
    </div>
    <div class="err" id="err"></div>

    <div id="divAlert" class="alert hidden"></div>
    <div class="summary hidden" id="summary"></div>
    <div id="pieWrap" class="pie hidden"></div>

    <div class="tablewrap">
    <table id="tableView">
      <thead>
        <tr>
          <th class="name">名稱</th>
          <th>成交</th><th>漲跌</th><th>幅度</th>
          <th>股數</th><th>買價</th><th>損益</th><th>報酬率</th><th>殖利率</th>
          <th>開</th><th>高</th><th>低</th><th>昨收</th><th>量</th><th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    </div>
    <div id="cards" class="hidden"></div>
    <div class="empty" id="empty">尚未加入任何股票，請於上方輸入代號。</div>
  </div>

  <!-- ───── 股利頁 ───── -->
  <div id="page-div" class="hidden">
    <div class="daterow">
      <label>區間</label>
      <input type="date" id="divStart">
      <label>~</label>
      <input type="date" id="divEnd">
      <button id="syncBtn">同步股利</button>
      <span id="divStatus" class="code"></span>
    </div>
    <div class="note">
      說明：來源為 FinMind 股利資料，<b>含 ETF 與個股、有歷史</b>，採<b>真正的除權息日</b>，
      現金與股票股利分開逐筆列示。現金＝每股現金 × 股數（元）；股票＝股數 × 每股股票股利 ÷ 10（股）。
      需先在「報價」頁填股數。
      註：FinMind 免費額度有每小時請求上限，若顯示達上限請稍後再按一次。
    </div>
    <div id="yearWrap" class="hidden">
      <div class="lbl" style="color:var(--sub);font-size:13px;margin-bottom:4px">各年度現金股利（依當年實際持股）</div>
      <div class="yearbars" id="yearBars"></div>
    </div>
    <div class="summary hidden" id="divSummary"></div>
    <div class="tablewrap">
    <table>
      <thead>
        <tr>
          <th class="name">名稱</th><th>類型</th><th class="name">除權息日</th><th class="name">發放日</th>
          <th>每股配發</th><th>股數</th><th>本筆領取</th>
        </tr>
      </thead>
      <tbody id="divBody"></tbody>
    </table>
    </div>
    <div class="empty" id="divEmpty">按「同步股利」抓取你清單內股票的股利資料。</div>
  </div>

  <div id="modal" class="modal hidden"></div>

<script>
const LS_KEY = "tw_watchlist_v1";
const LS_VIEW = "tw_view_v1";
const LS_PRIV = "tw_priv_v1";
const LS_DIV = "tw_div_cache_v1";
let watch = load();
let view = localStorage.getItem(LS_VIEW) || "table";   // table | cards
let timer = null;

function load(){
  let arr=[]; try{ arr = JSON.parse(localStorage.getItem(LS_KEY))||[]; }catch(e){ arr=[]; }
  // 舊格式 {code,qty,cost} → 交易紀錄 lots
  return arr.map(w => {
    if(Array.isArray(w.lots)) return w;
    const lots=[];
    if(w.qty) lots.push({date:"", type:"buy", shares:+w.qty, price:+(w.cost||0)});
    return {code:w.code, lots};
  });
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(watch)); }

// 交易紀錄推導
function lotsOf(w){ return Array.isArray(w.lots)?w.lots:[]; }
function curShares(w){ return lotsOf(w).reduce((a,l)=> a + (l.type==="sell"?-1:1)*(parseFloat(l.shares)||0), 0); }
function avgCost(w){ let s=0,c=0; lotsOf(w).forEach(l=>{ if(l.type!=="sell"){ const sh=parseFloat(l.shares)||0,p=parseFloat(l.price)||0; s+=sh; c+=sh*p; } }); return s>0?c/s:0; }
function sharesAt(w, iso){ return lotsOf(w).reduce((a,l)=> (!l.date||l.date<=iso) ? a+(l.type==="sell"?-1:1)*(parseFloat(l.shares)||0) : a, 0); }

// ───── 即時報價（經 CORS proxy，純前端無法直連 mis.twse）─────
const PROXIES = [
  u => "https://corsproxy.io/?url=" + encodeURIComponent(u),
  u => "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(u),
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
];

async function fetchVia(wrap, url, signal){
  const r = await fetch(wrap(url), {cache:"no-store", signal});
  if(!r.ok) throw new Error("HTTP "+r.status);
  const data = await r.json();
  if(!data || !data.msgArray) throw new Error("無資料");
  return data.msgArray;
}

async function fetchQuotes(codes){
  if(!codes.length) return [];
  const exch = codes.map(c => `tse_${c}.tw|otc_${c}.tw`).join("|");
  const url = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${exch}&json=1&delay=0&_=${Date.now()}`;
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 8000);
  try{
    return await Promise.any(PROXIES.map(w => fetchVia(w, url, ctrl.signal)));
  }catch(e){ throw new Error("來源逾時或無回應"); }
  finally{ clearTimeout(timer); ctrl.abort(); }
}

function num(v){ const n = parseFloat(v); return isNaN(n) ? null : n; }
function num0(v){ const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function pickPrice(m){
  let p = num(m.z);
  if(p===null){ const a = (m.a||"").split("_")[0]; p = num(a); }
  if(p===null){ const b = (m.b||"").split("_")[0]; p = num(b); }
  if(p===null) p = num(m.y);
  return p;
}
function fmt(n,d=2){ return n===null||n===undefined ? "—" : Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}); }
function clsOf(v){ return v===null||v===0 ? "flat" : (v>0?"up":"down"); }
function signOf(v){ return v>0?"▲":(v<0?"▼":""); }

let lastRows = [];

function calc(m, w){
  const price = pickPrice(m);
  const y = num(m.y);
  const diff = (price!==null && y!==null) ? price - y : null;
  const pct  = (diff!==null && y) ? diff / y * 100 : null;
  const qty = w ? curShares(w) : 0, cost = w ? avgCost(w) : 0;
  let pl=null, plPct=null, hasHold=false;
  if(qty>0 && cost>0 && price!==null){ hasHold=true; pl=(price-cost)*qty; plPct=(price-cost)/cost*100; }
  return {price, y, diff, pct, cls:clsOf(diff), sign:signOf(diff), vol:num(m.v), qty, cost, pl, plPct, hasHold};
}

function render(rows){
  if(rows) lastRows = rows;
  document.getElementById("empty").style.display = watch.length ? "none":"block";
  const byCode = {};
  lastRows.forEach(m => { byCode[m.c] = m; if(m.n) nameMap[m.c] = m.n; });
  if(view==="table") renderTable(byCode); else renderCards(byCode);
  renderSummary(byCode);
  renderPie(byCode);
  renderAlert();
}

function renderPie(byCode){
  const wrap = document.getElementById("pieWrap");
  const items = [];
  watch.forEach(w => { const m=byCode[w.code]; if(!m) return; const d=calc(m,w); if(d.hasHold) items.push({name:nameMap[w.code]||w.code, val:d.price*d.qty}); });
  if(items.length < 1){ wrap.classList.add("hidden"); wrap.innerHTML=""; return; }
  const total = items.reduce((a,x)=>a+x.val,0);
  items.sort((a,b)=>b.val-a.val);
  const colors=["#4f8cff","#ff5252","#26c281","#f7b955","#a06bff","#28c0c0","#ff8a65","#9aa0ad","#e066a6","#6ab04c"];
  let acc=0; const segs=items.map((x,i)=>{ const a=acc/total*360; acc+=x.val; return `${colors[i%colors.length]} ${a}deg ${acc/total*360}deg`; });
  const legend=items.map((x,i)=>`<div class="leg"><span class="dotc" style="background:${colors[i%colors.length]}"></span>${x.name} <span class="priv">${(x.val/total*100).toFixed(1)}%</span></div>`).join("");
  wrap.classList.remove("hidden");
  wrap.innerHTML=`<div class="pieC" style="background:conic-gradient(${segs.join(",")})"></div><div class="legwrap">${legend}</div>`;
}

function renderAlert(){
  const box = document.getElementById("divAlert");
  const today = new Date().toISOString().slice(0,10);
  const plus  = new Date(Date.now()+14*864e5).toISOString().slice(0,10);
  const items=[];
  watch.forEach(w => { const l=divData[w.code]; if(!l) return;
    l.forEach(d => { if(d.ex>=today && d.ex<=plus) items.push(`${nameMap[w.code]||w.code}(${w.code}) ${d.ex} ${d.kind==="cash"?"除息":"除權"}`); });
  });
  if(!items.length){ box.classList.add("hidden"); box.innerHTML=""; return; }
  box.classList.remove("hidden");
  box.innerHTML = "🔔 近 14 天除權息：" + items.join("　•　");
}

function renderIndex(arr){
  const bar = document.getElementById("indexBar");
  if(!arr || !arr.length) return;
  bar.innerHTML = arr.map(m => {
    const z=num(m.z), y=num(m.y);
    const diff=(z!==null&&y!==null)?z-y:null, pct=(diff!==null&&y)?diff/y*100:null, cls=clsOf(diff);
    const nm = m.n==="發行量加權股價指數"?"加權指數" : m.n==="櫃買指數"?"櫃買指數" : (m.n||m.ch);
    return `<span class="idx"><span class="lbl">${nm}</span> <b class="${cls}">${z===null?"—":fmt(z)}</b> <span class="${cls}">${diff===null?"":signOf(diff)+fmt(Math.abs(diff))+" ("+fmt(Math.abs(pct))+"%)"}</span></span>`;
  }).join("");
}

async function fetchIndices(){
  try{
    const url=`https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_t00.tw|otc_o00.tw&json=1&delay=0&_=${Date.now()}`;
    const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),8000);
    try{ renderIndex(await Promise.any(PROXIES.map(w=>fetchVia(w,url,ctrl.signal)))); }
    finally{ clearTimeout(t); ctrl.abort(); }
  }catch(e){}
}

function exportData(){
  const blob = new Blob([JSON.stringify({watch, view, exportedAt:new Date().toISOString()},null,2)], {type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="tw-stock-backup.json"; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function importData(file){
  const rd=new FileReader();
  rd.onload=()=>{ try{ const j=JSON.parse(rd.result);
      if(!Array.isArray(j.watch)) throw new Error("缺少 watch");
      watch = j.watch.map(w => Array.isArray(w.lots) ? w : {code:w.code, lots: w.qty?[{date:"",type:"buy",shares:+w.qty,price:+(w.cost||0)}]:[]});
      if(j.view) view=j.view; save(); setView(view); refresh();
      alert("匯入完成，共 "+watch.length+" 檔");
    }catch(e){ alert("匯入失敗："+e.message); } };
  rd.readAsText(file);
}

// ── 交易紀錄編輯彈窗 ──
function closeModal(){ const md=document.getElementById("modal"); md.classList.add("hidden"); md.innerHTML=""; }
function openLots(code){
  const w = watch.find(x=>x.code===code); if(!w) return;
  if(!Array.isArray(w.lots)) w.lots=[];
  const name = nameMap[code]||"";
  const md = document.getElementById("modal");
  const sumTxt = () => `持股 ${curShares(w).toLocaleString()} 股　平均成本 ${fmt(avgCost(w))}`;
  function rowsHtml(){ return w.lots.map((l,i)=>`<tr>
      <td><input type="date" data-i="${i}" data-f="date" value="${l.date||""}"></td>
      <td><select data-i="${i}" data-f="type"><option value="buy"${l.type!=="sell"?" selected":""}>買</option><option value="sell"${l.type==="sell"?" selected":""}>賣</option></select></td>
      <td><input type="number" min="0" step="1" data-i="${i}" data-f="shares" value="${l.shares??""}" placeholder="股數"></td>
      <td><input type="number" min="0" step="0.01" data-i="${i}" data-f="price" value="${l.price??""}" placeholder="價格"></td>
      <td><button class="mini lotdel" data-i="${i}">✕</button></td></tr>`).join(""); }
  function draw(){
    md.querySelector("#lotBody").innerHTML = rowsHtml();
    md.querySelector("#lotSummary").innerHTML = sumTxt();
    md.querySelectorAll("#lotBody input,#lotBody select").forEach(el=>{
      el.onchange=()=>{ const i=+el.dataset.i,f=el.dataset.f,v=el.value;
        w.lots[i][f]=(f==="shares"||f==="price")?(v===""?0:+v):v; save();
        md.querySelector("#lotSummary").innerHTML=sumTxt(); render(); };
    });
    md.querySelectorAll(".lotdel").forEach(b=>b.onclick=()=>{ w.lots.splice(+b.dataset.i,1); save(); draw(); render(); });
  }

async function openChart(code){
  const name=nameMap[code]||""; const md=document.getElementById("modal");
  md.innerHTML=`<div class="modal-box"><button class="x" id="cClose">✕</button><h3>${name} ${code}　近 3 個月收盤</h3><div id="cBody">載入中…</div></div>`;
  md.classList.remove("hidden");
  md.querySelector("#cClose").onclick=closeModal; md.onclick=e=>{ if(e.target===md) closeModal(); };
  try{
    const start=new Date(Date.now()-95*864e5).toISOString().slice(0,10);
    const r=await fetch(`${FINMIND}?dataset=TaiwanStockPrice&data_id=${encodeURIComponent(code)}&start_date=${start}`,{cache:"no-store"});
    const j=await r.json(); const data=(j.data||[]).filter(d=>d.close>0);
    md.querySelector("#cBody").innerHTML = data.length ? sparkSVG(data) : "查無股價資料（ETF/個股皆應有，或請稍後再試）";
  }catch(e){ md.querySelector("#cBody").textContent="載入失敗："+e.message; }
}
function sparkSVG(data){
  const W=520,H=220,pad=34,n=data.length;
  const xs=data.map(d=>d.close), min=Math.min(...xs), max=Math.max(...xs);
  const x=i=> pad + (n<2?0:i/(n-1))*(W-pad*2);
  const y=v=> H-pad - (max===min?0.5:(v-min)/(max-min))*(H-pad*2);
  const pts=data.map((d,i)=>`${x(i).toFixed(1)},${y(d.close).toFixed(1)}`).join(" ");
  const last=data[n-1].close, up=last>=data[0].close, col=up?"var(--up)":"var(--down)";
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <polyline fill="none" stroke="${col}" stroke-width="2" points="${pts}"/>
    <text x="4" y="14" fill="var(--sub)" font-size="11">${fmt(max)}</text>
    <text x="4" y="${H-pad+4}" fill="var(--sub)" font-size="11">${fmt(min)}</text>
    <text x="${W-4}" y="14" fill="${col}" font-size="14" text-anchor="end">${fmt(last)}</text>
    <text x="${pad}" y="${H-4}" fill="var(--sub)" font-size="10">${data[0].date.slice(5)}</text>
    <text x="${W-pad}" y="${H-4}" fill="var(--sub)" font-size="10" text-anchor="end">${data[n-1].date.slice(5)}</text>
  </svg>`;
}

// ── 各年度現金股利（依當年實際持股）──
function renderYearOverview(){
  const wrap=document.getElementById("yearWrap"), bars=document.getElementById("yearBars");
  const byYear={};
  watch.forEach(w=>{ const l=divData[w.code]; if(!l) return;
    l.forEach(d=>{ if(d.kind!=="cash"||!d.ex) return; const sh=sharesAt(w,d.ex); if(sh>0){ const yr=d.ex.slice(0,4); byYear[yr]=(byYear[yr]||0)+d.per*sh; } });
  });
  const years=Object.keys(byYear).sort();
  if(!years.length){ wrap.classList.add("hidden"); bars.innerHTML=""; return; }
  const maxV=Math.max(...years.map(y=>byYear[y]));
  wrap.classList.remove("hidden");
  bars.innerHTML=years.map(y=>`<div class="ybar"><span class="yl">${y}</span><span class="yt"><span class="yf" style="width:${(byYear[y]/maxV*100).toFixed(1)}%"></span></span><span class="yv priv">${fmt(byYear[y],0)} 元</span></div>`).join("");
}

function renderSummary(byCode){
  const box = document.getElementById("summary");
  let totalCost=0, totalVal=0, totalDiv=0, any=false;
  watch.forEach(w => {
    const m = byCode[w.code]; if(!m) return;
    const d = calc(m, w);
    if(d.hasHold){ any=true; totalCost += d.cost*d.qty; totalVal += d.price*d.qty; totalDiv += divCashTTM(w.code)*d.qty; }
  });
  if(!any){ box.classList.add("hidden"); box.innerHTML=""; return; }
  box.classList.remove("hidden");
  const pl = totalVal - totalCost;
  const plPct = totalCost ? pl/totalCost*100 : null;
  const cls = clsOf(pl);
  const plTot = pl + totalDiv;                 // 含息損益
  const plTotPct = totalCost ? plTot/totalCost*100 : null;
  const clsT = clsOf(plTot);
  const incLine = totalDiv>0 ? `
    <span><span class="lbl">含息損益</span> <b class="priv ${clsT}">${signOf(plTot)} ${fmt(Math.abs(plTot),0)}</b>
      <span class="priv ${clsT}">(${plTotPct===null?"—":signOf(plTot)+fmt(Math.abs(plTotPct))+"%"})</span></span>` : "";
  box.innerHTML = `
    <span><span class="lbl">總成本</span> <span class="priv">${fmt(totalCost,0)}</span></span>
    <span><span class="lbl">總市值</span> <span class="priv">${fmt(totalVal,0)}</span></span>
    <span><span class="lbl">總損益</span> <b class="priv ${cls}">${signOf(pl)} ${fmt(Math.abs(pl),0)}</b>
      <span class="priv ${cls}">(${plPct===null?"—":signOf(pl)+fmt(Math.abs(plPct))+"%"})</span></span>
    ${incLine}`;
}

// 拖曳排序
let dragCode = null;
function enableDrag(container, sel){
  container.querySelectorAll(sel).forEach(el => {
    el.style.cursor = "grab";
    el.ondragstart = e => {
      if(e.target.tagName==="BUTTON" || e.target.tagName==="INPUT"){ e.preventDefault(); return; }
      dragCode = el.dataset.code; e.dataTransfer.effectAllowed="move"; el.style.opacity=".4";
    };
    el.ondragend = () => { el.style.opacity="1"; dragCode=null; };
    el.ondragover = e => { e.preventDefault(); };
    el.ondrop = e => {
      e.preventDefault();
      const target = el.dataset.code;
      if(!dragCode || dragCode===target) return;
      const from = watch.findIndex(w=>w.code===dragCode);
      const to   = watch.findIndex(w=>w.code===target);
      if(from<0||to<0) return;
      const [moved] = watch.splice(from,1);
      watch.splice(to,0,moved);
      save(); render();
    };
  });
}

function addCode(){

  watch.push({code}); save(); inp.value="";
  render(); refresh();
}

// ───── 股利（FinMind，含 ETF＋個股、有歷史、真正除息日，可指定區間）─────
const FINMIND = "https://api.finmindtrade.com/api/v4/data";
const DIV_FROM = "2023-01-01";   // 抓此日起的歷史，渲染時再依使用者區間篩選
let divData = {};   // code -> [{kind, ex, pay, per}]
let nameMap = {};   // code -> 名稱（取自報價）

// 近一年現金股利合計（元/股），供殖利率與含息報酬使用
function divCashTTM(code){
  const list = divData[code]; if(!list) return 0;
  const cut = new Date(Date.now()-365*864e5).toISOString().slice(0,10);
  return list.filter(d => d.kind==="cash" && d.ex>=cut).reduce((a,d)=>a+d.per, 0);
}

async function syncDividends(){
  const st = document.getElementById("divStatus");
  if(!watch.length){ st.textContent = "請先到「報價」頁加入股票"; return; }
  st.textContent = "同步中…";
  try{
    const results = await Promise.all(watch.map(async w => {
      const url = `${FINMIND}?dataset=TaiwanStockDividend&data_id=${encodeURIComponent(w.code)}&start_date=${DIV_FROM}`;
      try{
        const r = await fetch(url, {cache:"no-store"});
        const j = await r.json();
        if(j.msg && /limit/i.test(j.msg)) return [w.code, null, "FinMind 請求達上限"];
        const rows = [];
        (j.data||[]).forEach(d => {
          const cash  = (d.CashEarningsDistribution||0) + (d.CashStatutorySurplus||0);
          const stock = (d.StockEarningsDistribution||0) + (d.StockStatutorySurplus||0);
          if(cash>0)  rows.push({ kind:"cash",  ex: d.CashExDividendTradingDate  || d.date || "", pay: d.CashDividendPaymentDate || "", per: cash });
          if(stock>0) rows.push({ kind:"stock", ex: d.StockExDividendTradingDate || d.date || "", pay: "", per: stock });
        });
        return [w.code, rows.filter(d=>d.ex)];
      }catch(e){ return [w.code, null, e.message]; }
    }));
    const map={}; let err="";
    results.forEach(([code, rows, e]) => { if(rows) map[code]=rows; else if(e) err=e; });
    divData = map;
    localStorage.setItem(LS_DIV, JSON.stringify(map));
    st.textContent = (err ? err+"；" : "") + "完成 " + new Date().toLocaleString("zh-TW");
    renderDivPage();
  }catch(e){ st.textContent = "同步失敗：" + e.message; }
}

function renderDivPage(){
  const s = document.getElementById("divStart").value;
  const e = document.getElementById("divEnd").value;
  const body = document.getElementById("divBody");
  const empty = document.getElementById("divEmpty");
  const sum = document.getElementById("divSummary");
  if(!watch.length){ empty.textContent="請先到「報價」頁加入股票"; empty.style.display="block"; body.innerHTML=""; sum.classList.add("hidden"); return; }
  if(!Object.keys(divData).length){ empty.textContent='按「同步股利」抓取你清單內股票的股利資料。'; empty.style.display="block"; body.innerHTML=""; sum.classList.add("hidden"); return; }
  empty.style.display="none";
  let totalCash=0, totalShares=0;
  const rows=[];
  watch.forEach(w => {
    const list = divData[w.code];
    const name = nameMap[w.code] || "";
    const nameCell = `<td class="name"><b>${name}</b> <span class="code">${w.code}</span></td>`;
    if(!list){ rows.push(`<tr>${nameCell}<td colspan="6" class="flat">查無（尚未同步或無資料）</td></tr>`); return; }
    const inR = list.filter(d => d.ex && (!s||d.ex>=s) && (!e||d.ex<=e))
                    .sort((a,b)=> a.ex<b.ex ? -1 : 1);
    if(!inR.length){ rows.push(`<tr>${nameCell}<td colspan="6" class="flat">區間內無除權息</td></tr>`); return; }
    let stCash=0, stShares=0;
    const detail = inR.map(d => {              // 每筆依「該除權息日當下持股」計算
      const shAt = sharesAt(w, d.ex);
      let typeTxt, perTxt, recTxt;
      if(d.kind==="cash"){
        const got = d.per * shAt; stCash += got;
        typeTxt = "現金"; perTxt = `現金 ${fmt(d.per,3)}`;
        recTxt = shAt>0 ? `<span class="priv up">${fmt(got,0)} 元</span>` : '<span class="flat">當時未持有</span>';
      }else{
        const shares = shAt * d.per / 10; stShares += shares;
        typeTxt = "股票"; perTxt = `股票 ${fmt(d.per,3)}`;
        recTxt = shAt>0 ? `<span class="priv up">${fmt(shares,0)} 股</span>` : '<span class="flat">當時未持有</span>';
      }
      return `<tr class="drow" data-g="${w.code}">
        <td class="name"></td>
        <td>${typeTxt}</td>
        <td class="name code">${d.ex}</td>
        <td class="name code">${d.pay||"—"}</td>
        <td>${perTxt}</td>
        <td class="priv">${shAt>0?shAt.toLocaleString():"—"}</td>
        <td class="recv">${recTxt}</td>
      </tr>`;
    }).join("");
    totalCash += stCash; totalShares += stShares;
    const parts=[];
    if(stCash)   parts.push(`<span class="priv up">${fmt(stCash,0)} 元</span>`);
    if(stShares) parts.push(`<span class="priv up">${fmt(stShares,0)} 股</span>`);
    const subTxt = parts.length ? parts.join("　") : '<span class="flat">當時未持有/未填交易</span>';
    rows.push(`<tr class="dhead" data-g="${w.code}">
      <td class="name"><span class="arrow">▸</span> <b>${name}</b> <span class="code">${w.code}</span></td>
      <td colspan="3" class="code">${inR.length} 筆</td>
      <td></td>
      <td class="priv">${curShares(w)?curShares(w).toLocaleString():"—"}</td>
      <td>${subTxt}</td>
    </tr>`);
    rows.push(detail);
  });
  renderYearOverview();
  body.innerHTML = rows.join("");
  body.querySelectorAll("tr.dhead").forEach(h => h.onclick = () => {
    const g = h.dataset.g;
    const open = h.classList.toggle("open");
    h.querySelector(".arrow").textContent = open ? "▾" : "▸";
    body.querySelectorAll(`tr.drow[data-g="${g}"]`).forEach(r => r.classList.toggle("show", open));
  });
  sum.classList.remove("hidden");
  sum.innerHTML = `<span class="lbl">區間 ${s||"—"} ~ ${e||"—"}（依除權息日）</span>
    <span><span class="lbl">現金股利合計</span> <b class="priv up">${fmt(totalCash,0)} 元</b></span>
    <span><span class="lbl">股票股利合計</span> <b class="priv up">${fmt(totalShares,0)} 股</b></span>`;
}
